<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash & Flow | Inventario Detallado</title>
    <!-- Use the existing CSS for general styles -->
    <link rel="stylesheet" href="../css/styles.css">
    <!-- Our new specific styles for inventario -->
    <link rel="stylesheet" href="inventario.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Main Content -->
    <main id="main-content">

        <!-- Fondo sólido sin video -->
        <div
            style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background-color: var(--bg-color);">
        </div>

        <nav class="navbar glassmorphism">
            <div class="nav-logo"><a href="../index.html" style="color:inherit; text-decoration:none;">CASH & FLOW</a>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html#blog">Nosotros</a></li>
                <li><a href="inventario.html" class="active">Inventario</a></li>
                <li><a href="../index.html#events">Eventos</a></li>
                <li><a href="../index.html#contact">Contacto</a></li>
                <li><a href="../admin.html" class="admin-btn">Admin</a></li>
            </ul>
        </nav>

        <section class="inventory-page">
            <header class="inv-header">
                <img src="coche_neon.png" alt="Coche Neon" class="inv-hero-img">
                <h1 class="inv-title">INVENTARIO</h1>
                <h2 class="inv-subtitle">El coche de tus sueños al alcance de la punta de tus dedos</h2>
            </header>

            <div class="inv-search-container">
                <input type="text" placeholder="Busca por modelo, marca..." class="inv-search-bar">
            </div>

            <div class="inv-layout">
                <!-- Sidebar Filtros (Kavak Style layout) -->
                <aside class="inv-sidebar">
                    <h3>Filtros</h3>

                    <div class="filter-group">
                        <label>Precio</label>
                        <select>
                            <option>Todos</option>
                            <option>Hasta $1,000,000</option>
                            <option>$1,000,001 - $3,000,000</option>
                            <option>Más de $3,000,000</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Marca</label>
                        <select>
                            <option>Todas</option>
                            <option>Porsche</option>
                            <option>Mercedes-Benz</option>
                            <option>Audi</option>
                            <option>BMW</option>
                            <option>Lamborghini</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Modelo</label>
                        <select>
                            <option>Todos</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Año</label>
                        <select>
                            <option>Todos</option>
                            <option>2024</option>
                            <option>2023</option>
                            <option>2022</option>
                            <option>2021 o anterior</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Color Exterior</label>
                        <select>
                            <option>Todos</option>
                            <option>Negro</option>
                            <option>Blanco</option>
                            <option>Gris</option>
                            <option>Plata</option>
                            <option>Rojo</option>
                            <option>Azul</option>
                        </select>
                    </div>
                </aside>

                <!-- Grid de resultados -->
                <section class="inv-results">
                    <div class="cars-grid inv-cars-grid">

                        <!-- Inventory will be loaded dynamically by js/inventario.js -->

                    </div>
                </section>
            </div>
        </section>

        <!-- FOOTER / CONTACTO -->
        <footer id="contact" class="site-footer">
            <div class="footer-logo">CASH &amp; FLOW</div>
            <p class="footer-tagline">Querétaro, México — El garage de los que saben.</p>
            <div class="footer-links">
                <a href="inventario.html">Inventario</a>
                <a href="../index.html#blog">Blog</a>
                <a href="../admin.html">Admin</a>
            </div>
            <p class="footer-copy">© 2024 Cash &amp; Flow. Todos los derechos reservados.</p>
        </footer>

    </main>

    <!-- Supabase JS Client & Initialization -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>

    <!-- Dynamic Fetching -->
    <script src="../js/inventario.js"></script>
</body>

</html>
